name: Phase 1 - RAG Pipeline Tests

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Pipeline to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - quantitative
          - graph
          - standard
          - orchestrator
      questions:
        description: 'Number of questions per pipeline'
        required: true
        default: '5'
        type: string
      mode:
        description: 'Test mode'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

env:
  N8N_HOST: http://localhost:5678
  N8N_WEBHOOK_HOST: http://localhost:5678
  N8N_API_KEY: rag-ci-nomos-2026-b7f8a91d2e3c4f5a6b7c8d9e0f1a2b3c4d5e6f7

jobs:
  test-rag-pipelines:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests python-dotenv aiohttp

      - name: Create logs directory
        run: mkdir -p logs

      - name: Copy rag-tests docker-compose
        run: cp rag-tests-docker-compose.yml docker-compose.yml

      - name: Start n8n stack
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_AUTH: ${{ secrets.NEO4J_AUTH }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          N8N_API_KEY: rag-ci-nomos-2026-b7f8a91d2e3c4f5a6b7c8d9e0f1a2b3c4d5e6f7
          N8N_ENCRYPTION_KEY: sota-rag-2026-encryption-key-change-me
        run: |
          docker compose up -d
          echo "Waiting for n8n..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:5678/healthz > /dev/null 2>&1; then
              echo "n8n ready after $((i*5))s"; break
            fi
            sleep 5
          done
          curl -sf http://localhost:5678/healthz || (docker compose logs n8n-main && exit 1)
          sleep 10
          docker compose ps

      - name: Setup n8n (credentials + API key)
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          N8N_API_KEY: rag-ci-nomos-2026-b7f8a91d2e3c4f5a6b7c8d9e0f1a2b3c4d5e6f7
        run: |
          python3 scripts/ci_n8n_setup.py --supabase-password "$SUPABASE_PASSWORD"

      - name: Patch workflow JSONs with CI credential IDs
        run: |
          python3 scripts/patch_workflow_credentials.py \
            --old1 zEr7jPswZNv6lWKu --new1 "$CRED1_ID" \
            --old2 USU8ngVzsUbED3mn --new2 "$CRED2_ID"

      - name: Import n8n workflows via CLI (no auth needed)
        run: |
          for wf_file in n8n/live/standard.json n8n/live/graph.json n8n/live/quantitative.json n8n/live/orchestrator.json; do
            if [ -f "$wf_file" ]; then
              WF_NAME=$(python3 -c "import json; print(json.load(open('$wf_file')).get('name','?'))")
              if docker compose exec -T n8n-main sh -c 'n8n import:workflow --input=-' < "$wf_file" 2>&1; then
                echo "Imported via CLI: $WF_NAME"
              else
                echo "CLI import failed for: $WF_NAME — trying REST API..."
                N8N_KEY="${N8N_CI_API_KEY:-rag-ci-nomos-2026-b7f8a91d2e3c4f5a6b7c8d9e0f1a2b3c4d5e6f7}"
                RESP=$(curl -s -X POST "http://localhost:5678/rest/workflows" \
                  -H "Content-Type: application/json" --data @"$wf_file")
                echo "$RESP" | grep -q '"id"' && echo "Imported via REST: $WF_NAME" || echo "Both methods failed: $WF_NAME"
              fi
            fi
          done

      - name: Activate all workflows via REST
        run: |
          # /rest/ is accessible without auth when N8N_USER_MANAGEMENT_DISABLED=true
          curl -s "http://localhost:5678/rest/workflows?limit=20" \
            | python3 -c "import json,sys,urllib.request; d=json.load(sys.stdin); wfs=d.get('data',d) if isinstance(d,dict) else d; [urllib.request.urlopen(urllib.request.Request('http://localhost:5678/rest/workflows/'+str(w.get('id',''))+'/activate',method='POST',headers={'Content-Type':'application/json'})) or print('Activated:',w.get('name','')[:50]) for w in (wfs if isinstance(wfs,list) else []) if not w.get('active')]"
          echo "Activation done"

      - name: Create .env.local
        run: |
          printf 'N8N_HOST=http://localhost:5678\nN8N_API_KEY=rag-ci-nomos-2026-b7f8a91d2e3c4f5a6b7c8d9e0f1a2b3c4d5e6f7\n' > .env.local
          printf 'OPENROUTER_API_KEY=%s\n' "${{ secrets.OPENROUTER_API_KEY }}" >> .env.local
          printf 'JINA_API_KEY=%s\n' "${{ secrets.JINA_API_KEY }}" >> .env.local
          printf 'PINECONE_API_KEY=%s\n' "${{ secrets.PINECONE_API_KEY }}" >> .env.local
          printf 'PINECONE_HOST=%s\n' "${{ secrets.PINECONE_HOST }}" >> .env.local
          printf 'NEO4J_URI=%s\n' "${{ secrets.NEO4J_URI }}" >> .env.local
          printf 'SUPABASE_URL=%s\n' "${{ secrets.SUPABASE_URL }}" >> .env.local
          printf 'SUPABASE_API_KEY=%s\n' "${{ secrets.SUPABASE_API_KEY }}" >> .env.local

      - name: Run Phase 1 tests
        id: tests
        run: |
          set -o allexport; source .env.local; set +o allexport
          PIPELINE="${{ inputs.pipeline }}"
          QUESTIONS="${{ inputs.questions }}"
          if [ "$PIPELINE" = "all" ]; then
            python3 eval/quick-test.py --questions $QUESTIONS --pipeline standard 2>&1 | tee logs/test-standard.log
            python3 eval/quick-test.py --questions $QUESTIONS --pipeline graph 2>&1 | tee logs/test-graph.log
            python3 eval/quick-test.py --questions $QUESTIONS --pipeline quantitative 2>&1 | tee logs/test-quantitative.log
            python3 eval/quick-test.py --questions $QUESTIONS --pipeline orchestrator 2>&1 | tee logs/test-orchestrator.log
          else
            python3 eval/quick-test.py --questions $QUESTIONS --pipeline $PIPELINE 2>&1 | tee logs/test-$PIPELINE.log
          fi

      - name: Run full iterative eval
        if: inputs.mode == 'full'
        run: |
          set -o allexport; source .env.local; set +o allexport
          python3 eval/iterative-eval.py --label "GH-Actions-$(date +%Y%m%d)" 2>&1 | tee logs/iterative-eval.log

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase1-test-logs-${{ github.run_id }}
          path: |
            logs/*.log
            logs/*.json
            logs/*.txt
          retention-days: 7
          if-no-files-found: warn

      - name: n8n logs on failure
        if: failure()
        run: docker compose logs n8n-main --tail 80
