# Standalone n8n stack for rag-website Codespace
# Started by setup.sh AFTER devcontainer is built (NOT referenced in devcontainer.json)
version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_website
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-n8npass}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-nomos-website-key}
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
    volumes:
      - n8n_website_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: n8n_website
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${DB_POSTGRESDB_PASSWORD:-n8npass}
    volumes:
      - postgres_website_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n_website"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n8n_website_data:
  postgres_website_data:
