# Standalone n8n stack for rag-data-ingestion Codespace
# Started by setup.sh AFTER devcontainer is built (NOT referenced in devcontainer.json)
# Queue mode with 2 workers for parallel ingestion
version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_ingestion
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-n8npass}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-nomos-ingestion-key}
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=2
    volumes:
      - n8n_ingestion_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  n8n-worker-1:
    image: n8nio/n8n:latest
    command: worker --concurrency=3
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_ingestion
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-n8npass}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-nomos-ingestion-key}
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      # External API keys (from .env.local or Codespace secrets)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1/chat/completions
      - JINA_API_KEY=${JINA_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_URL=${PINECONE_HOST:-https://sota-rag-jina-1024-a4mkzmz.svc.aped-4627-b74a.pinecone.io}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - NEO4J_URL=${NEO4J_URI:-https://38c949a2.databases.neo4j.io/db/neo4j/query/v2}
      - NEO4J_AUTH=${NEO4J_AUTH}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY}
      # LLM Models
      - LLM_SQL_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_FAST_MODEL=google/gemma-3-27b-it:free
      - LLM_EXTRACTION_MODEL=arcee-ai/trinity-large-preview:free
      - LLM_CHUNKING_MODEL=arcee-ai/trinity-large-preview:free
      # Embeddings
      - EMBEDDING_API_URL=https://api.jina.ai/v1/embeddings
      - EMBEDDING_MODEL=jina-embeddings-v3
      - EMBEDDING_DIM=1024
    volumes:
      - n8n_ingestion_data:/home/node/.n8n
    depends_on:
      - n8n
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e 'process.exit(0)'"]
      interval: 30s
      timeout: 10s
      retries: 3

  n8n-worker-2:
    image: n8nio/n8n:latest
    command: worker --concurrency=3
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_ingestion
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-n8npass}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-nomos-ingestion-key}
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      # External API keys (from .env.local or Codespace secrets)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1/chat/completions
      - JINA_API_KEY=${JINA_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_URL=${PINECONE_HOST:-https://sota-rag-jina-1024-a4mkzmz.svc.aped-4627-b74a.pinecone.io}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - NEO4J_URL=${NEO4J_URI:-https://38c949a2.databases.neo4j.io/db/neo4j/query/v2}
      - NEO4J_AUTH=${NEO4J_AUTH}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY}
      # LLM Models
      - LLM_SQL_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_FAST_MODEL=google/gemma-3-27b-it:free
      - LLM_EXTRACTION_MODEL=arcee-ai/trinity-large-preview:free
      - LLM_CHUNKING_MODEL=arcee-ai/trinity-large-preview:free
      # Embeddings
      - EMBEDDING_API_URL=https://api.jina.ai/v1/embeddings
      - EMBEDDING_MODEL=jina-embeddings-v3
      - EMBEDDING_DIM=1024
    volumes:
      - n8n_ingestion_data:/home/node/.n8n
    depends_on:
      - n8n
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e 'process.exit(0)'"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: n8n_ingestion
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${DB_POSTGRESDB_PASSWORD:-n8npass}
    volumes:
      - postgres_ingestion_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n_ingestion"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_ingestion_data:/data

volumes:
  n8n_ingestion_data:
  postgres_ingestion_data:
  redis_ingestion_data:
