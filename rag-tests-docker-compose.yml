# docker-compose.yml pour GitHub Actions + Codespace rag-tests
# N8N LOCAL avec 3 workers — remplace le tunnel SSH vers VM
# Copier ce fichier dans rag-tests/docker-compose.yml (auto via test-phase1.yml)
#
# Usage: docker compose up -d
# Ensuite: source .env.local && python3 eval/quick-test.py --pipeline quantitative --questions 5

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  n8n-main:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- Core n8n ---
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - N8N_PUBLIC_API_DISABLED=false
      # N8N_USER_MANAGEMENT_DISABLED is deprecated in n8n 2.x — removed
      # ci_n8n_setup.py creates owner + API key on first run
      - N8N_GLOBAL_ADMIN_API_KEY=rag-ci-nomos-2026-b7f8a91d2e3c4f5a6b7c8d9e0f1a2b3c4d5e6f7
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme-same-as-vm}
      - N8N_LOG_LEVEL=debug
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      # Global execution timeout: kill stale executions after 5 min
      - EXECUTIONS_TIMEOUT=300
      # --- Queue mode ---
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      # --- PostgreSQL ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      # --- Executions pruning ---
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=24

      # ============================================
      # EXTERNAL API KEYS (from GitHub Secrets)
      # ============================================
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1/chat/completions
      - JINA_API_KEY=${JINA_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_URL=${PINECONE_HOST:-https://sota-rag-jina-1024-a4mkzmz.svc.aped-4627-b74a.pinecone.io}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}

      # --- Neo4j ---
      - NEO4J_URL=${NEO4J_URI:-https://38c949a2.databases.neo4j.io/db/neo4j/query/v2}
      - NEO4J_AUTH=${NEO4J_AUTH}

      # --- Supabase ---
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY}

      # ============================================
      # LLM Models
      # ============================================
      - LLM_SQL_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_FAST_MODEL=google/gemma-3-27b-it:free
      - LLM_INTENT_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_PLANNER_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_AGENT_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_HYDE_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_EXTRACTION_MODEL=arcee-ai/trinity-large-preview:free
      - LLM_COMMUNITY_MODEL=arcee-ai/trinity-large-preview:free
      - LLM_FALLBACK_INTENT=arcee-ai/trinity-large-preview:free
      - LLM_FALLBACK_AGENT=arcee-ai/trinity-large-preview:free
      - LLM_LITE_MODEL=google/gemma-3-27b-it:free
      - LLM_CHUNKING_MODEL=arcee-ai/trinity-large-preview:free

      # ============================================
      # EMBEDDINGS & RERANKING
      # ============================================
      - EMBEDDING_API_URL=https://api.jina.ai/v1/embeddings
      - EMBEDDING_MODEL=jina-embeddings-v3
      - EMBEDDING_DIM=1024
      - EMBEDDING_DIMS=1024
      - RERANKER_API_URL=https://api.jina.ai/v1/rerank
      - RERANKER_MODEL=jina-reranker-v2-base-multilingual
      - COHERE_API_URL=https://api.cohere.ai/v1/rerank

      # ============================================
      # WORKFLOW IDs (pour l'orchestrateur)
      # ============================================
      - WF2_GRAPH_RAG_ID=Vxm4TDdOLdb7j3Jy
      - WF3_ULTIMATE_RAG_ID=M12n4cmiVBoBusUe
      - WF4_QUANTITATIVE_RAG_ID=nQnAJyT06NTbEQ3y
      - WF5_STANDARD_RAG_ID=M12n4cmiVBoBusUe

    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker 1 — Pipeline Standard + Orchestrator
  n8n-worker-1:
    image: n8nio/n8n:latest
    restart: unless-stopped
    command: worker --concurrency=2
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme-same-as-vm}
      - N8N_LOG_LEVEL=debug
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      # External APIs needed by workers for workflow execution
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1/chat/completions
      - JINA_API_KEY=${JINA_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_URL=${PINECONE_HOST:-https://sota-rag-jina-1024-a4mkzmz.svc.aped-4627-b74a.pinecone.io}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - NEO4J_URL=${NEO4J_URI:-https://38c949a2.databases.neo4j.io/db/neo4j/query/v2}
      - NEO4J_AUTH=${NEO4J_AUTH}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY}
      - LLM_SQL_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_FAST_MODEL=google/gemma-3-27b-it:free
      - LLM_INTENT_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_PLANNER_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_AGENT_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_HYDE_MODEL=meta-llama/llama-3.3-70b-instruct:free
      - LLM_EXTRACTION_MODEL=arcee-ai/trinity-large-preview:free
      - LLM_COMMUNITY_MODEL=arcee-ai/trinity-large-preview:free
      - LLM_FALLBACK_INTENT=arcee-ai/trinity-large-preview:free
      - LLM_FALLBACK_AGENT=arcee-ai/trinity-large-preview:free
      - LLM_LITE_MODEL=google/gemma-3-27b-it:free
      - EMBEDDING_API_URL=https://api.jina.ai/v1/embeddings
      - EMBEDDING_MODEL=jina-embeddings-v3
      - EMBEDDING_DIM=1024
      - RERANKER_API_URL=https://api.jina.ai/v1/rerank
      - RERANKER_MODEL=jina-reranker-v2-base-multilingual
      - COHERE_API_URL=https://api.cohere.ai/v1/rerank
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - n8n-main

  # Worker 2 — Pipeline Graph
  n8n-worker-2:
    image: n8nio/n8n:latest
    restart: unless-stopped
